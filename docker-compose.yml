version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: tvameva-mysql
    environment:
      MYSQL_ROOT_PASSWORD: drupal
      MYSQL_DATABASE: drupal
      MYSQL_USER: drupal
      MYSQL_PASSWORD: drupal
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "drupal", "-pdrupal"]
      interval: 5s
      timeout: 3s
      retries: 10

  drupal:
    build: ./infrastructure/drupal
    container_name: tvameva-drupal
    ports:
      - "8080:80"
    environment:
      DRUPAL_DB_HOST: mysql
      DRUPAL_DB_PORT: "3306"
      DRUPAL_DB_NAME: drupal
      DRUPAL_DB_USER: drupal
      DRUPAL_DB_PASSWORD: drupal
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Accept: application/vnd.api+json", "http://localhost/jsonapi"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

volumes:
  mysql_data:
