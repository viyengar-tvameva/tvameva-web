---
apiVersion: v1
kind: Namespace
metadata:
  name: drupal
  labels:
    app: tvameva-cms

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drupal
  namespace: drupal
  labels:
    app: drupal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: drupal
  template:
    metadata:
      labels:
        app: drupal
    spec:
      containers:
        - name: drupal
          image: drupal:10-apache
          ports:
            - containerPort: 80
              name: http
          env:
            - name: DRUPAL_DB_HOST
              value: "34.134.209.31"
            - name: DRUPAL_DB_PORT
              value: "3306"
            - name: DRUPAL_DB_NAME
              value: "drupal"
            - name: DRUPAL_DB_USER
              value: "drupal"
            - name: DRUPAL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: drupal-secrets
                  key: db-password
          volumeMounts:
            - name: drupal-files
              mountPath: /var/www/html/sites/default/files
            - name: drupal-modules
              mountPath: /var/www/html/modules/custom
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30

      volumes:
        - name: drupal-files
          persistentVolumeClaim:
            claimName: drupal-files-pvc
        - name: drupal-modules
          persistentVolumeClaim:
            claimName: drupal-modules-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: drupal-service
  namespace: drupal
  labels:
    app: drupal
spec:
  type: ClusterIP
  selector:
    app: drupal
  ports:
    - port: 8080
      targetPort: 80
      protocol: TCP
      name: http

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: drupal-files-pvc
  namespace: drupal
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard-rwo

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: drupal-modules-pvc
  namespace: drupal
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard-rwo

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drupal-ingress
  namespace: drupal
  annotations:
    networking.gke.io/managed-certificates: "tvameva-cms-cert"
spec:
  ingressClassName: gce
  rules:
    - host: cms.tvameva.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: drupal-service
                port:
                  number: 8080

---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: tvameva-cms-cert
  namespace: drupal
spec:
  domains:
    - cms.tvameva.ai
